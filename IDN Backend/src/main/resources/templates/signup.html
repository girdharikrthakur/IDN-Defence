<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-xl p-8 w-96">

        <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

        <form id="registerForm" class="space-y-4">
            <div id="errorMessage" class="hidden bg-red-100 text-red-700 p-3 rounded-lg text-sm"></div>

            <div>
                <label class="block text-sm font-medium text-gray-600">Username</label>
                <input type="text" name="username"
                    class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
                    placeholder="Enter username" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600">Email</label>
                <input type="email" name="email"
                    class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
                    placeholder="Enter email" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600">Password</label>
                <input type="password" name="password"
                    class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
                    placeholder="Enter password" required>
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition">
                Sign Up
            </button>

            <p class="text-center text-sm text-gray-500">
                Already have an account?
                <a href="/login" class="text-indigo-600 hover:underline">Login</a>
            </p>

        </form>

    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async function (e) {

            e.preventDefault();

            const errorDiv = document.getElementById("errorMessage");
            errorDiv.classList.add("hidden");

            const formData = new FormData(this);

            const data = {
                userName: formData.get("username"),
                email: formData.get("email"),
                password: formData.get("password")
            };

            const response = await fetch("/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                window.location.href = "/login";
            } else {

                const errorText = await response.text();

                errorDiv.innerText = errorText;
                errorDiv.classList.remove("hidden");

            }

        });
    </script>

</body>

</html>
