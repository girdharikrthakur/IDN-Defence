<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
        }

        .container {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #4f46e5;
        }

        .extra {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .extra a {
            color: #6366f1;
            text-decoration: none;
        }

        .extra a:hover {
            text-decoration: underline;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }

        .oauthbutton {
            width: 100px;
            height: 45px;
            color: white;
            background-color: #555;
            border-radius: 15px;

        }

        .social_login {
            margin: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Login</h2>

        <!-- Spring Security error -->
        <div th:if="${param.error}" class="error">
            Invalid email or password
        </div>

        <form onsubmit="loginUser(event)">

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button class="login-btn" type="submit">Login</button>

        </form>

        <div class="social_login">
            <p>Login with</p>

            <button class="oauthbutton" onclick="window.location.href='/oauth2/authorization/google'">Google</button>
            <button class="oauthbutton" onclick="window.location.href='/oauth2/authorization/github'">GitHub</button>

        </div>

    </div>

    <script>
        async function loginUser(event) {
            event.preventDefault(); // ❌ stop default form submit

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch("http://localhost:8080/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                if (!response.ok) {
                    alert("Invalid credentials");
                    return;
                }

                // ✅ Get JWT from header
                const token = response.headers.get("Authorization");
                const refreshToken = response.headers.get("refreshToken");

                // ✅ Store token
                localStorage.setItem("accessToken", token);
                localStorage.setItem("refreshToken", refreshToken);

                alert("Login successful");

                // ✅ Redirect
                window.location.href = "/home";

            } catch (error) {
                console.error(error);
                alert("Something went wrong");
            }
        }
    </script>

</body>

</html>
