spring.application.name=idn-news
server.port=${SERVER_PORT:8080}
spring.threads.virtual.enabled=true
springdoc.swagger-ui.enabled=true



# PostgreSQL DB Configuration
spring.datasource.url=${SPRING_DB_URL:jdbc:postgresql://localhost:5432/idn_news}
spring.datasource.username=${SPRING_DB_USER:postgres}
spring.datasource.password=${SPRING_DB_PWD:Imhound@101}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true


# Sendgrid Config
spring.sendgrid.api-key=${SENDGRID_API_KEY}

#Email Verification address
app.verify.url=http://localhost:8080/public/api/v1/signup/verify



# GCP config
gcp.credentials.path==${GCP_CRED_PATH}
gcp.bucket.name==${GCP_BUCKET_NAME}

